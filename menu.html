<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Menu</title>

<link href="https://fonts.googleapis.com/css2?family=Padauk&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    padding:20px;
    text-align:center;
    font-family:'Padauk', sans-serif;
    background-image: url(image/photo_7.jpg);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}

/* Title */
h1{
    color:white;
    margin-top:30px;
    font-size:28px;
}

/* Menu container */
.menu{
    margin-top:30px;
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:15px;
}

/* Cards */
.card{
    background:white;
    width:220px;
    padding:15px;
    border-radius:15px;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    background:#ffe6f7;
}

/* Video Section */
#videoSection{
    margin-top:40px;
}

#videoSection h2{
    color:white;
}

/* Video Layout */
.video-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
}

.video-card video{
    width:100%;
    max-width:320px;
    border-radius:10px;
}

/* Wish message */
#wishMessage{
    margin-top: 30px;
    font-size: 24px;
    color: #ff0066;
    font-weight: bold;
    animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* 📱 Mobile */
@media (max-width: 600px){
    h1{
        font-size:22px;
    }

    .card{
        width:90%;
    }

    #wishMessage{
        font-size:20px;
    }
}

/* 📱 Tablet */
@media (min-width: 601px) and (max-width: 1024px){
    .card{
        width:45%;
    }
}

/* 💻 Desktop */
@media (min-width: 1025px){
    .card{
        width:220px;
    }
}

</style>
</head>

<body>

<h1>💖 Surprise Menu 💖</h1>

<div class="menu">
    <div class="card" id="wishCard">🎂မောင့်အတွက် မွေးနေ့ဆုတောင်း</div>
    <div class="card" id="videoCardBtn">🎬နားထောင်စေချင်တဲ့ သီချင်း</div>
    <div class="card" id="photoCard">📸 Photo</div>
</div>

<!-- Video Section -->
<div id="videoSection">
    <h2>🎬 Video များ</h2>

    <div class="video-container">
        <div class="video-card">
            <video controls>
                <source src="vedio/video_5.mp4" type="video/mp4">
            </video>
        </div>
    </div>
</div>

<script>
const wishCard = document.getElementById('wishCard');
const photoCard = document.getElementById('photoCard');
const videoCardBtn = document.getElementById('videoCardBtn');

wishCard.addEventListener('click', () => {
    window.location.href = "bdwish2.html";
});

photoCard.addEventListener('click', () => {
    window.location.href = "photofile.html";
});

videoCardBtn.addEventListener('click', () => {
    document.getElementById("videoSection").scrollIntoView({
        behavior: "smooth"
    });
});
</script>

</body>
</html>
