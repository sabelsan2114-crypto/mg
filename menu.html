<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Menu</title>
<link href="https://fonts.googleapis.com/css2?family=Padauk&display=swap" rel="stylesheet">
<!--background:linear-gradient(to right,#ff99cc,#ffccff);-->
<style>
body{
    text-align:center;
    font-family:'Padauk', sans-serif;
    background-image: url(image/photo_7.jpg);
}

h1{
    color:white;
    margin-top:40px;
}

.menu{
    margin-top:30px;
}

.card{
    background:white;
    width:220px;
    margin:15px auto;
    padding:15px;
    border-radius:15px;
    box-shadow:0 4px 8px rgba(0,0,0,0.2);
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:scale(1.05);
    background:#ffe6f7;
}

.video-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    margin-top: 20px;
}

.video-card {
    position: relative;
    text-align: center;
}

/* Birthday wish style */
#wishMessage{
    margin-top: 30px;
    font-size: 28px;
    color: #ff0066;
    font-weight: bold;
    animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

</style>
</head>

<body>

<h1>💖 Surprise Menu 💖</h1>

<div class="menu">
    <div class="card" id="wishCard">🎂မောင့်အတွက် မွေးနေ့ဆုတောင်း</div>
    <div class="card" id="videoCardBtn">🎬 Video များ</div>
    <div class="card" id="quizCard">❓ မေးခွန်းများ</div>
</div>

<!-- Video Section -->
<div id="videoSection">
    <h2>🎬 Video များ</h2>

    <div class="video-container">
        <div class="video-card">
            <video width="300" controls>
                <source src="vedio/video_5.mp4" type="video/mp4">
            </video>
        </div>
    </div>
</div>

<!-- JavaScript -->
<script>
const wishCard = document.getElementById('wishCard');

wishCard.addEventListener('click', () => {
    // bdwish.html ဖိုင်ကို open လုပ်မယ်
    window.location.href = "bdwish2.html";
});
</script>

</body>
</html>
