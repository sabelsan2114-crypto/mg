<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Mg</title>

    <link href="https://fonts.googleapis.com/css2?family=Padauk&display=swap" rel="stylesheet">

    <style>
        body {
            text-align: center;
            background-color: #ffe6f0;
            font-family: 'Padauk', 'Pyidaungsu', sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ff3399;
            font-size: 28px;
        }

        img {
            width: 80%;
            max-width: 300px;
            border-radius: 20px;
        }

        p {
            font-size: 16px;
        }

        button {
            padding: 12px 20px;
            margin: 10px;
            background-color: #ff66b2;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 2px 2px 5px #ff006638;
            font-size: 16px;
        }

        button:hover {
            opacity: 0.95;
            transform: scale(0.95);
        }

        #message {
            margin-top: 15px;
            opacity: 0;
            transition: 0.5s;
            font-weight: bold;
            color: #ff0066;
        }

        /* 📱 Mobile (small devices) */
        @media (max-width: 480px) {
            h1 {
                font-size: 22px;
            }

            p {
                font-size: 14px;
            }

            button {
                width: 90%;
                font-size: 14px;
            }
        }

        /* 💻 Tablet */
        @media (min-width: 481px) and (max-width: 768px) {
            h1 {
                font-size: 26px;
            }

            img {
                width: 70%;
            }
        }

        /* 🖥 Desktop */
        @media (min-width: 769px) {
            h1 {
                font-size: 32px;
            }

            img {
                width: 300px;
            }
        }
    </style>
</head>

<body>

    <h1>Happy Birthday Mg 🎂💖</h1>

    <img src="image/mygif1.gif" alt="Our Photo">

    <p>စံပယ့်ရဲ့ မောင်ရေ မွေးနေ့မှာ ပျော်ရွှင်ပါစေနော်💕</p>

    <button id="openBtn">ဖွင့်ရန် 💌</button>
    <button id="closeBtn">ပိတ်ရန် 💌</button>

    <p id="message"></p>

    <script>
        const closeBtn = document.getElementById("closeBtn");
        const message = document.getElementById("message");

        closeBtn.addEventListener("click", function () {
            message.innerText = "ပိတ်လိုက်ရင် စံပယ် စိတ်ကောက်မှာနော် 😤💕";
            message.style.opacity = "1";
            closeBtn.style.display = "none";
        });

        const openBtn = document.getElementById("openBtn");
        openBtn.addEventListener("click", function () {
            window.location.href = "menu.html";
        });
    </script>

</body>
</html>
